<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    

    <section>
        <div class="container">
            <div class="todo-card">
                <div class="todo-header">
                    <h2>My Tasks</h2>
                </div>
                <div class="todo-body">
                    <!-- Input bar -->
                    <div class="input-group">
                        <input type="text" class="todo-input" placeholder="Add a new task..." id="inputBox"/>
                        <button class="add-btn" onclick="addTask()">Add</button>
                    </div>
                    <!-- List -->
                    <ul id="todoList">
                    </ul>
                </div>
            </div>
        </div>
    </section>



    <script src="script.js"></script>
</body>
</html>
